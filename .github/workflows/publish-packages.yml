name: Publish Packages

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.repository == 'recallnet/goal-planner' &&
      !contains(github.event.head_commit.message, 'chore: version packages [skip ci]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          output=$(pnpm changeset status 2>&1) && rc=0 || rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
            echo "Found pending changesets"
          elif echo "$output" | grep -qi "no.*changesets"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets"
          else
            echo "::error::changeset status failed unexpectedly:"
            echo "$output"
            exit 1
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm changeset version

      - name: Commit and push version changes
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages [skip ci]" || echo "No changes to commit"
          git push

      - name: Publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm changeset publish

      - name: Create GitHub Release
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -e "console.log(require('./package.json').version)")
          name=$(node -e "console.log(require('./package.json').name)")
          tag="v${version}"
          body="${name} ${version} published to npmjs."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "${name}@${version}" --notes "$body"
          else
            gh release create "$tag" --target HEAD --title "${name}@${version}" --notes "$body"
          fi
